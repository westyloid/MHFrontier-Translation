name: Release translations

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate all CSVs
        run: python scripts/validate.py translations/

      - name: Export JSON (all strings)
        run: python scripts/export_json.py --out translations.json

      - name: Export JSON (translated only)
        run: python scripts/export_json.py --out translations-translated.json --only-translated

      - name: Clone FrontierTextHandler
        run: git clone --depth=1 https://github.com/Houmgaor/FrontierTextHandler.git fth

      - name: Build translated binary files (fr)
        run: python scripts/build_bins.py --fth-dir fth --lang fr --out release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: translations
          path: |
            translations.json
            translations-translated.json
            release/fr-*.bin

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest translations
          body: |
            Auto-generated translation files, updated on every push to `main`.

            ### JSON
            - `translations.json` — all strings (source + target)
            - `translations-translated.json` — translated strings only

            ### Binary game files (French)
            Apply automatically with [mhf-outpost](https://github.com/Mogapedia/mhf-outpost):
            ```
            mhf-outpost translate --path <game_dir>
            ```
            Or copy manually into your game directory:

            | Asset | Replace |
            |-------|---------|
            | `fr-mhfdat.bin` | `mhfdat.bin` |
            | `fr-mhfpac.bin` | `mhfpac.bin` |
            | `fr-mhfinf.bin` | `mhfinf.bin` |
            | `fr-mhfjmp.bin` | `mhfjmp.bin` |
          files: |
            translations.json
            translations-translated.json
            release/fr-mhfdat.bin
            release/fr-mhfpac.bin
            release/fr-mhfinf.bin
            release/fr-mhfjmp.bin
          make_latest: true
