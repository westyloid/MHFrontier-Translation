name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate translation statistics
        run: python scripts/stats.py --output docs/stats.json

      - name: Print coverage summary
        run: |
          python - <<'EOF'
          import json
          with open("docs/stats.json") as f:
              stats = json.load(f)
          for lang, ls in stats["languages"].items():
              print(f"## {lang.upper()}: {ls['coverage']}% ({ls['translated']}/{ls['total']} strings)")
              for xpath, fs in ls["files"].items():
                  bar = "█" * int(fs["coverage"] / 5) + "░" * (20 - int(fs["coverage"] / 5))
                  print(f"  {bar} {fs['coverage']:5.1f}%  {xpath}")
          EOF

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - uses: actions/deploy-pages@v4
        id: deployment
